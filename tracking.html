<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAMA WRAP - Tracking & Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #d32f2f;
            --success-color: #2e7d32;
            --delivery-color: #0288d1;
            --warning-color: #ef6c00;
            --bg-color: #f4f4f4;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 480px; }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            text-align: center;
        }

        h2 { color: var(--primary-color); margin-bottom: 20px; font-size: 1.5em; }

        /* มอนิเตอร์คิวรวม */
        .queue-monitor {
            background: #fff3e0;
            border: 2px solid #ffcc80;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }
        .queue-header {
            font-size: 1.2em;
            color: #d32f2f;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            border-bottom: 2px dashed #ffcc80;
            padding-bottom: 10px;
        }
        .queue-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 5px;
            border-bottom: 1px solid #ffe0b2;
            font-size: 0.95em;
        }
        .queue-row:last-child { border-bottom: none; }
        .q-number { font-weight: bold; color: #333; }
        .q-status-cooking { color: var(--warning-color); font-weight: bold; }
        .q-status-done { color: var(--success-color); font-weight: bold; }

        /* ระบบแชท */
        .admin-msg-box { background: #fff3e0; border: 1px solid #ffcc80; padding: 12px; border-radius: 12px; margin-top: 10px; color: #d32f2f; font-size: 0.9em; position: relative; }
        .customer-msg-box { background: #e8f5e9; border: 1px solid #a5d6a7; padding: 12px; border-radius: 12px; margin-top: 10px; color: #2e7d32; font-size: 0.9em; text-align: right; }
        .chat-input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin-top: 10px; font-family: 'Kanit'; box-sizing: border-box; }
        .btn-send-chat { background: var(--primary-color); color: white; border: none; padding: 8px; border-radius: 8px; width: 100%; margin-top: 5px; font-weight: bold; cursor: pointer; }

        /* รายการออเดอร์ของฉัน */
        .order-item {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            text-align: left;
            border-left: 8px solid var(--warning-color);
            position: relative;
        }
        .order-item.status-done { border-left-color: var(--success-color); }
        .order-item.status-delivery { border-left-color: var(--delivery-color); }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .badge-cooking { background: #fff3e0; color: var(--warning-color); }
        .badge-done { background: #e8f5e9; color: var(--success-color); }
        .badge-out { background: #e1f5fe; color: var(--delivery-color); }

        .customer-info { font-size: 0.9em; color: #666; margin-bottom: 5px; }
        .order-details { font-size: 1em; color: #333; font-weight: 400; line-height: 1.4; }

        /* Admin UI */
        #admin-ui { display: none; width: 100%; border-top: 2px dashed #ccc; padding-top: 20px; margin-top: 20px; }
        .admin-actions { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-action { flex: 1; padding: 10px; border: none; border-radius: 8px; font-family: 'Kanit'; font-weight: 600; cursor: pointer; color: white; font-size: 0.9em; }
        .admin-card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #ddd; text-align: left; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; color: white; font-family: 'Kanit'; font-weight: 600; cursor: pointer; }
        .btn-cooking { background: var(--warning-color); }
        .btn-done { background: var(--success-color); }

        .back-link { text-decoration: none; color: white; background: #333; padding: 12px; border-radius: 10px; display: block; margin-top: 15px; font-weight: bold; text-align: center; }
        #secret-trigger { margin-top: 60px; color: #ddd; font-size: 0.7em; padding: 20px; user-select: none; -webkit-user-select: none; }

        /* ปุ่มเปิดเสียง */
        #sound-notice { background: var(--primary-color); color: white; cursor: pointer; padding: 15px; border-radius: 15px; margin-bottom: 15px; width: 100%; border: none; font-weight: bold; font-family: 'Kanit'; }
    </style>
</head>
<body>

<audio id="notifySound" src="notify.mp3" preload="auto"></audio>

<div class="container">
    <button id="sound-notice" onclick="enableSound()">🔈 แตะเพื่อเปิดเสียงแจ้งเตือนเมื่ออาหารเสร็จ</button>

    <div class="queue-monitor">
        <div class="queue-header">
            📊 คิวหน้าร้านตอนนี้<br>
            <span style="font-size: 0.8em; color: #555;">(รอคิวอยู่: <span id="queue-count">0</span> คิว)</span>
        </div>
        <div id="public-queue-list">
            <div style="text-align:center; color:#888; padding: 10px;">กำลังโหลดคิว...</div>
        </div>
    </div>

    <div id="customer-ui" class="card">
        <h2>📍 ออเดอร์ของฉัน</h2>
        <div id="order-list">กำลังตรวจสอบออเดอร์ของคุณ...</div>
        <a href="index.html" class="back-link">← กลับไปหน้าสั่งอาหาร</a>
    </div>

    <div id="admin-ui">
        <h2 style="text-align:center; color:#333; margin-bottom: 10px;">👨‍🍳 ระบบหลังบ้าน & แชท</h2>
        <div class="admin-actions">
            <button class="btn-action" style="background:#ff9800;" onclick="clearDoneOrders()">🧹 ล้างที่เสร็จแล้ว</button>
            <button class="btn-action" style="background:#d32f2f;" onclick="clearAllOrders()">🗑️ ล้างทั้งหมด</button>
        </div>
        <div id="admin-order-list"></div>
    </div>
</div>

<div id="secret-trigger">MAMA WRAP SYSTEM v2.2</div>

<script>
    const SUPABASE_URL = 'https://chomrpeichvhabaslsvr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNob21ycGVpY2h2aGFiYXNsc3ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjU5NjksImV4cCI6MjA5MDA0MTk2OX0.jC122_jMSTIh7kcRNCBxfR_OcPQYfjByMzdnoz6Qa_s';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const myName = localStorage.getItem('customerName') || "";
    const myPhone = localStorage.getItem('customerPhone') || "";

    let lastDataState = {}; // เก็บข้อมูลล่าสุดเพื่อเช็คการแจ้งเตือน
    let soundEnabled = false;

    // ฟังก์ชันเปิดเสียง (ลูกค้าต้องกดครั้งแรก)
    function enableSound() {
        document.getElementById('notifySound').play().then(() => {
            document.getElementById('notifySound').pause();
            soundEnabled = true;
            document.getElementById('sound-notice').style.display = 'none';
        }).catch(err => alert('กรุณากดเปิดเสียงอีกครั้งครับ'));
    }

    function playNotify() {
        if (soundEnabled) {
            const audio = document.getElementById('notifySound');
            audio.currentTime = 0;
            audio.play().catch(e => console.log(e));
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }
    }

    function maskName(name) {
        if(!name) return "ลูกค้า";
        if(name.length <= 2) return name + "***";
        return name.substring(0, 2) + "***";
    }

    async function refreshOrders() {
        const { data: orders, error } = await _supabase.from('orders').select('*').order('created_at', { ascending: true });
        if (error) return;

        const now = new Date().getTime();
        const activeOrders = orders.filter(o => {
            if (o.status === 'done') {
                const orderTime = new Date(o.created_at).getTime();
                if (now - orderTime > 3600000) return false;
            }
            return true;
        });

        // ตรวจสอบสถานะเพื่อแจ้งเตือนเสียง
        activeOrders.forEach(o => {
            if (o.customer_name === myName) {
                const prev = lastDataState[o.id];
                if (prev) {
                    // 1. อาหารเสร็จ 2. มีการกดเรียกจากร้าน 3. มีข้อความใหม่จากร้าน
                    if ((prev.status === 'cooking' && o.status === 'done') || 
                        (o.call_trigger > (prev.call_trigger || 0)) ||
                        (o.admin_note !== prev.admin_note && o.admin_note !== "")) {
                        playNotify();
                    }
                }
                lastDataState[o.id] = o;
            }
        });

        // 1. คิวรวม
        let cookingCount = 0;
        let queueHTML = activeOrders.length === 0 ? '<div style="text-align:center; color:#999; padding:10px;">คิวว่างจ้า</div>' : "";
        activeOrders.forEach((o, index) => {
            if (o.status === 'cooking') cookingCount++;
            queueHTML += `<div class="queue-row"><div class="q-number">คิวที่ ${index+1} - คุณ ${maskName(o.customer_name)}</div><div class="${o.status==='done'?'q-status-done':'q-status-cooking'}">${o.status==='done'?'✅ เสร็จแล้ว':'👨‍🍳 กำลังทำ'}</div></div>`;
        });
        document.getElementById('queue-count').innerText = cookingCount;
        document.getElementById('public-queue-list').innerHTML = queueHTML;

        // 2. ออเดอร์ของฉัน
        const myOrders = activeOrders.filter(o => o.customer_name === myName).reverse();
        const listDiv = document.getElementById('order-list');
        if (myOrders.length === 0) {
            listDiv.innerHTML = `<p style="color:#999;">ไม่พบออเดอร์ล่าสุด</p>`;
        } else {
            listDiv.innerHTML = myOrders.map(o => `
                <div class="order-item ${o.status === 'done' ? 'status-done' : ''}">
                    <span class="status-badge ${o.status==='done'?'badge-done':'badge-cooking'}">${o.status==='done'?'✅ เสร็จแล้ว':'👨‍🍳 กำลังทำ'}</span>
                    <div class="customer-info">คุณ ${o.customer_name}</div>
                    <div class="order-details">${o.order_details}</div>
                    ${o.admin_note ? `<div class="admin-msg-box">🏠 <b>ร้านส่งข้อความ:</b> ${o.admin_note}</div>` : ''}
                    ${o.customer_note ? `<div class="customer-msg-box">💬 <b>ฉันตอบ:</b> ${o.customer_note}</div>` : ''}
                    <input type="text" id="rep_${o.id}" class="chat-input" placeholder="พิมพ์คุยกับร้าน...">
                    <button class="btn-send-chat" onclick="sendReply('${o.id}', document.getElementById('rep_${o.id}').value)">ส่งข้อความตอบกลับ</button>
                </div>
            `).join('');
        }

        // 3. หลังบ้าน (Admin)
        if (document.getElementById('admin-ui').style.display === 'block') {
            const adminList = document.getElementById('admin-order-list');
            const adminOrders = [...activeOrders].reverse();
            adminList.innerHTML = adminOrders.map(o => `
                <div class="admin-card" style="${o.customer_note ? 'border: 2px solid var(--success-color)' : ''}">
                    <strong>${o.customer_name}</strong>
                    <div style="font-size:0.8em;">${o.order_details}</div>
                    ${o.customer_note ? `<div style="color:var(--success-color); margin-top:5px;">🙋‍♂️ <b>ลูกค้าตอบว่า:</b> ${o.customer_note}</div>` : ''}
                    <input type="text" id="note_${o.id}" class="chat-input" placeholder="พิมพ์หาลูกค้า..." value="${o.admin_note || ''}">
                    <div class="btn-group">
                        <button class="btn btn-cooking" style="background:var(--warning-color)" onclick="sendAdminNote('${o.id}', document.getElementById('note_${o.id}').value)">💬 ส่ง/เรียก</button>
                        <button class="btn btn-done" onclick="updateStatus('${o.id}', 'done')">✅ เสร็จ</button>
                    </div>
                </div>
            `).join('');
        }
    }

    async function sendAdminNote(id, msg) {
        const { data } = await _supabase.from('orders').select('call_trigger').eq('id', id).single();
        await _supabase.from('orders').update({ admin_note: msg, call_trigger: (data.call_trigger || 0) + 1 }).eq('id', id);
        alert('ส่งข้อความและเรียกเสียงแจ้งเตือนแล้ว!');
    }

    async function sendReply(id, msg) {
        if(!msg) return;
        await _supabase.from('orders').update({ customer_note: msg }).eq('id', id);
        alert('ส่งข้อความหาร้านแล้วครับ');
        document.getElementById(`rep_${id}`).value = "";
    }

    async function updateStatus(id, s) { await _supabase.from('orders').update({ status: s }).eq('id', id); refreshOrders(); }
    async function clearDoneOrders() { if(confirm('ล้างที่เสร็จแล้ว?')) { await _supabase.from('orders').delete().eq('status', 'done'); refreshOrders(); } }
    async function clearAllOrders() { if(confirm('ล้างทั้งหมด?')) { const { data } = await _supabase.from('orders').select('id'); if(data) await _supabase.from('orders').delete().in('id', data.map(o => o.id)); refreshOrders(); } }

    _supabase.channel('orders-channel').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, refreshOrders).subscribe();

    let timer;
    document.getElementById('secret-trigger').onmousedown = document.getElementById('secret-trigger').ontouchstart = () => {
        timer = setTimeout(() => {
            if (prompt("รหัสพนักงาน:") === "0420") {
                document.getElementById('admin-ui').style.display = 'block';
                refreshOrders();
            }
        }, 2000);
    };
    document.getElementById('secret-trigger').onmouseup = document.getElementById('secret-trigger').ontouchend = () => clearTimeout(timer);

    refreshOrders();
</script>
</body>
</html>
