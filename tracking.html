<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAMA WRAP - Tracking & Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #d32f2f;
            --success-color: #2e7d32;
            --delivery-color: #0288d1;
            --warning-color: #ef6c00;
            --bg-color: #f4f4f4;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 480px; }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            text-align: center;
        }

        h2 { color: var(--primary-color); margin-bottom: 20px; font-size: 1.5em; }

        /* มอนิเตอร์คิวรวม */
        .queue-monitor {
            background: #fff3e0;
            border: 2px solid #ffcc80;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }
        .queue-header {
            font-size: 1.2em;
            color: #d32f2f;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            border-bottom: 2px dashed #ffcc80;
            padding-bottom: 10px;
        }
        .queue-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 5px;
            border-bottom: 1px solid #ffe0b2;
            font-size: 0.95em;
        }
        .queue-row:last-child { border-bottom: none; }
        .q-number { font-weight: bold; color: #333; }
        .q-status-cooking { color: var(--warning-color); font-weight: bold; }
        .q-status-done { color: var(--success-color); font-weight: bold; }

        /* ระบบแชท */
        .admin-msg-box { background: #fff3e0; border: 1px solid #ffcc80; padding: 10px; border-radius: 12px; margin-top: 8px; color: #d32f2f; font-size: 0.9em; text-align: left; }
        .customer-msg-box { background: #e8f5e9; border: 1px solid #a5d6a7; padding: 10px; border-radius: 12px; margin-top: 8px; color: #2e7d32; font-size: 0.9em; text-align: right; align-self: flex-end; }
        .chat-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-top: 10px; font-family: 'Kanit'; box-sizing: border-box; font-size: 1em; }
        .btn-send-chat { background: var(--primary-color); color: white; border: none; padding: 12px; border-radius: 10px; margin-top: 5px; cursor: pointer; width: 100%; font-weight: bold; }

        /* รายการออเดอร์ */
        .order-item {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            text-align: left;
            border-left: 8px solid var(--warning-color);
        }
        .order-item.status-done { border-left-color: var(--success-color); }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .badge-cooking { background: #fff3e0; color: var(--warning-color); }
        .badge-done { background: #e8f5e9; color: var(--success-color); }

        .customer-info { font-size: 0.9em; color: #666; margin-bottom: 5px; }
        .order-details { font-size: 1em; color: #333; font-weight: 400; line-height: 1.4; }

        /* Admin UI */
        #admin-ui { display: none; width: 100%; border-top: 2px dashed #ccc; padding-top: 20px; margin-top: 20px; }
        .admin-actions { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-action { flex: 1; padding: 10px; border: none; border-radius: 8px; font-family: 'Kanit'; font-weight: 600; cursor: pointer; color: white; font-size: 0.9em; }
        .admin-card { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #ddd; text-align: left; }
        .btn-group-admin { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px; }
        .btn-adm { padding: 10px 5px; border: none; border-radius: 8px; color: white; font-family: 'Kanit'; font-weight: 600; cursor: pointer; font-size: 0.85em; }

        .back-link { text-decoration: none; color: white; background: #333; padding: 12px; border-radius: 10px; display: block; margin-top: 15px; font-weight: bold; text-align: center; }
        #secret-trigger { margin-top: 60px; color: #ddd; font-size: 0.7em; padding: 20px; user-select: none; -webkit-user-select: none; }

        /* แถบแชท */
        .chat-container { scroll-behavior: smooth; }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<audio id="orderDoneSound" src="orderdone.mp3" preload="auto"></audio>
<audio id="msgNotifySound" src="notify.mp3" preload="auto"></audio>

<div class="container">
    <div class="queue-monitor">
        <div class="queue-header">
            📊 คิวหน้าร้านตอนนี้<br>
            <span style="font-size: 0.8em; color: #555;">(รอคิวอยู่: <span id="queue-count">0</span> คิว)</span>
        </div>
        <div id="public-queue-list">
            <div style="text-align:center; color:#888; padding: 10px;">กำลังโหลดคิว...</div>
        </div>
    </div>

    <div id="customer-ui" class="card">
        <h2>📍 ออเดอร์ของฉัน</h2>
        <div id="order-list">กำลังตรวจสอบออเดอร์...</div>
        <a href="index.html" class="back-link">← กลับไปหน้าสั่งอาหาร</a>
    </div>

    <div id="admin-ui">
        <h2 style="text-align:center; color:#333; margin-bottom: 10px;">👨‍🍳 ระบบหลังบ้าน & แชท</h2>
        <div class="admin-actions">
            <button class="btn-action" style="background:#ff9800;" onclick="clearDoneOrders()">🧹 ล้างที่เสร็จแล้ว</button>
            <button class="btn-action" style="background:#d32f2f;" onclick="clearAllOrders()">🗑️ ล้างทั้งหมด</button>
        </div>
        <div id="admin-order-list"></div>
    </div>
</div>

<div id="secret-trigger">MAMA WRAP SYSTEM v2.8</div>

<script>
    // ลงทะเบียน Service Worker สำหรับ PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then((registration) => {
                console.log('ServiceWorker ทำงานเรียบร้อย');
            }).catch((err) => {
                console.log('ServiceWorker ติดตั้งไม่สำเร็จ: ', err);
            });
        });
    }

    const SUPABASE_URL = 'https://chomrpeichvhabaslsvr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNob21ycGVpY2h2aGFiYXNsc3ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjU5NjksImV4cCI6MjA5MDA0MTk2OX0.jC122_jMSTIh7kcRNCBxfR_OcPQYfjByMzdnoz6Qa_s';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const myName = localStorage.getItem('customerName') || "";
    let lastDataState = {};
    let soundUnlocked = false;

    // โหลดสถานะ Admin จาก localStorage
    let isAdminActive = localStorage.getItem('isMAMAWrapAdmin') === 'true';
    if (isAdminActive) {
        document.getElementById('admin-ui').style.display = 'block';
    }

    // ฟังก์ชันคืนชีพตอนตื่นจากพื้นหลัง
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
            refreshOrders();
        }
    });

    // ระบบแอบปลดล็อกเสียงเงียบๆ และขอสิทธิ์แจ้งเตือนระบบ
    function setupSilentUnlock() {
        const unlock = () => {
            if (soundUnlocked) return;
            const s1 = document.getElementById('orderDoneSound');
            const s2 = document.getElementById('msgNotifySound');
            const u = (s) => { s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(e => {}); };
            u(s1); u(s2);
            soundUnlocked = true;

            if ("Notification" in window && Notification.permission !== "granted") {
                Notification.requestPermission();
            }
        };
        window.addEventListener('click', unlock, { once: true });
        window.addEventListener('touchstart', unlock, { once: true });
    }

    function showSystemNotification(title, body) {
        if ("Notification" in window && Notification.permission === "granted") {
            if (document.visibilityState !== 'visible') {
                new Notification(title, { body: body });
            }
        }
    }

    function playOrderDone() {
        if (soundUnlocked) {
            const audio = document.getElementById('orderDoneSound');
            audio.currentTime = 0; audio.play().catch(e => {});
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }
    }

    function playMsgNotify() {
        if (soundUnlocked) {
            const audio = document.getElementById('msgNotifySound');
            audio.currentTime = 0; audio.play().catch(e => {});
            if (navigator.vibrate) navigator.vibrate([200]);
        }
    }

    function maskName(name) {
        if(!name) return "ลูกค้า";
        if(name.length <= 2) return name + "***";
        return name.substring(0, 2) + "***";
    }

    // ฟังก์ชันช่วยดึงข้อความล่าสุดแบบปลอดภัย 100% ไม่พังตอนค่าว่าง
    function extractLatestText(noteStr, expectedSender) {
        if (!noteStr) return null;
        try {
            let parsed = JSON.parse(noteStr);
            if (Array.isArray(parsed) && parsed.length > 0) {
                let lastMsg = parsed[parsed.length - 1];
                if (lastMsg.sender === expectedSender) return lastMsg.text;
                return null;
            }
        } catch(e) {
            // ถ้าพังแปลว่าเป็นข้อความระบบเก่า (ไม่ใช่ JSON)
            return noteStr;
        }
        return null;
    }

    async function refreshOrders() {
        const { data: orders, error } = await _supabase.from('orders').select('*').order('created_at', { ascending: true });
        if (error) return;

        const activeOrders = orders.filter(o => {
            if (o.status === 'done') {
                const orderTime = new Date(o.created_at).getTime();
                if (new Date().getTime() - orderTime > 3600000) return false;
            }
            return true;
        });

        activeOrders.forEach(o => {
            const prev = lastDataState[o.id];
            if (prev) {
                // ฝั่งลูกค้า
                if (o.customer_name === myName) {
                    if ((prev.status === 'cooking' && o.status === 'done') || (o.call_trigger > (prev.call_trigger || 0))) {
                        playOrderDone();
                        showSystemNotification("MAMA WRAP", "อาหารของคุณเสร็จแล้ว / ร้านเรียกรับอาหารครับ!");
                    } else if (o.admin_note !== prev.admin_note && o.admin_note !== "") {
                        let latestAdminText = extractLatestText(o.admin_note, 'admin');
                        if (latestAdminText) {
                            playMsgNotify();
                            showSystemNotification("MAMA WRAP", "ร้านข้อความมา: " + latestAdminText);
                        }
                    }
                }
                
                // ฝั่ง Admin
                if (isAdminActive) {
                    let isNewCustomerMsg = false;
                    let txtToNotify = "";

                    // เช็คจาก JSON แบบใหม่
                    if (o.admin_note !== prev.admin_note) {
                        let extracted = extractLatestText(o.admin_note, 'customer');
                        if (extracted) { isNewCustomerMsg = true; txtToNotify = extracted; }
                    }
                    
                    // เช็คจากข้อมูลระบบเก่าที่ยังใช้ช่อง customer_note อยู่
                    if (!isNewCustomerMsg && o.customer_note !== prev.customer_note && o.customer_note !== "") {
                        isNewCustomerMsg = true;
                        txtToNotify = o.customer_note;
                    }

                    if (isNewCustomerMsg) {
                        playMsgNotify();
                        showSystemNotification("MAMA WRAP Admin", "ลูกค้าตอบกลับ: " + txtToNotify);
                    }
                }
            }
            lastDataState[o.id] = o;
        });

        // 1. คิวรวม
        let cookingCount = 0;
        let queueHTML = activeOrders.length === 0 ? '<div style="text-align:center; color:#999; padding:10px;">คิวว่างจ้า</div>' : "";
        activeOrders.forEach((o, index) => {
            if (o.status === 'cooking') cookingCount++;
            queueHTML += `<div class="queue-row"><div class="q-number">คิวที่ ${index+1} - คุณ ${maskName(o.customer_name)}</div><div class="${o.status==='done'?'q-status-done':'q-status-cooking'}">${o.status==='done'?'✅ เสร็จแล้ว':'👨‍🍳 กำลังทำ'}</div></div>`;
        });
        document.getElementById('queue-count').innerText = cookingCount;
        document.getElementById('public-queue-list').innerHTML = queueHTML;

        // 2. ออเดอร์ของฉัน
        const myOrders = activeOrders.filter(o => o.customer_name === myName).reverse();
        const listDiv = document.getElementById('order-list');
        if (myOrders.length === 0) {
            listDiv.innerHTML = `<p style="color:#999;">ไม่พบออเดอร์ล่าสุด</p>`;
        } else {
            listDiv.innerHTML = myOrders.map(o => {
                let chatHTML = "";
                try {
                    let chatLog = JSON.parse(o.admin_note);
                    if (Array.isArray(chatLog)) {
                        chatLog.forEach(c => {
                            if (c.sender === 'admin') chatHTML += `<div class="admin-msg-box">🏠 <b>ร้านบอกว่า:</b> ${c.text}</div>`;
                            else chatHTML += `<div class="customer-msg-box">💬 <b>ฉันตอบ:</b> ${c.text}</div>`;
                        });
                    }
                } catch(e) {
                    if (o.admin_note) chatHTML += `<div class="admin-msg-box">🏠 <b>ร้านบอกว่า:</b> ${o.admin_note}</div>`;
                    if (o.customer_note) chatHTML += `<div class="customer-msg-box">💬 <b>ฉันตอบ:</b> ${o.customer_note}</div>`;
                }

                return `
                    <div class="order-item ${o.status === 'done' ? 'status-done' : ''}">
                        <span class="status-badge ${o.status==='done'?'badge-done':'badge-cooking'}">${o.status==='done'?'✅ เสร็จแล้ว':'👨‍🍳 กำลังทำ'}</span>
                        <div class="customer-info">คุณ ${o.customer_name}</div>
                        <div style="font-size:1em; margin: 5px 0; border-bottom: 1px dashed #ccc; padding-bottom: 10px;">${o.order_details}</div>
                        <div class="chat-container" style="max-height: 250px; overflow-y: auto; margin-top: 10px; display: flex; flex-direction: column;">
                            ${chatHTML}
                        </div>
                        <input type="text" id="rep_${o.id}" class="chat-input" placeholder="พิมพ์คุยกับร้าน...">
                        <button class="btn-send-chat" onclick="sendReply('${o.id}')">ส่งข้อความตอบกลับ</button>
                    </div>
                `;
            }).join('');
        }

        // 3. หลังบ้าน
        if (isAdminActive) {
            const adminList = document.getElementById('admin-order-list');
            adminList.innerHTML = [...activeOrders].reverse().map(o => {
                let chatHTML = "";
                try {
                    let chatLog = JSON.parse(o.admin_note);
                    if (Array.isArray(chatLog)) {
                        chatLog.forEach(c => {
                            if (c.sender === 'admin') chatHTML += `<div style="color:var(--primary-color); font-weight:bold; margin: 4px 0; text-align: left; background:#fff3e0; padding:8px; border-radius:8px;">🏠 ร้าน: ${c.text}</div>`;
                            else chatHTML += `<div style="color:var(--success-color); font-weight:bold; margin: 4px 0; text-align: right; background:#e8f5e9; padding:8px; border-radius:8px;">🙋‍♂️ ลูกค้า: ${c.text}</div>`;
                        });
                    }
                } catch(e) {
                    if (o.admin_note) chatHTML += `<div style="color:var(--primary-color); font-weight:bold; margin: 4px 0; text-align: left; background:#fff3e0; padding:8px; border-radius:8px;">🏠 ร้าน: ${o.admin_note}</div>`;
                    if (o.customer_note) chatHTML += `<div style="color:var(--success-color); font-weight:bold; margin: 4px 0; text-align: right; background:#e8f5e9; padding:8px; border-radius:8px;">🙋‍♂️ ลูกค้า: ${o.customer_note}</div>`;
                }

                return `
                    <div class="admin-card" style="${o.customer_note ? 'border: 2px solid var(--success-color)' : ''}">
                        <strong>${o.customer_name}</strong>
                        <div style="font-size:0.8em; margin: 5px 0; border-bottom: 1px dashed #ccc; padding-bottom: 5px;">${o.order_details}</div>
                        <div class="chat-container" style="max-height: 200px; overflow-y: auto; margin: 10px 0; padding: 5px; background: #fafafa; border-radius: 8px; display: flex; flex-direction: column;">
                            ${chatHTML}
                        </div>
                        <input type="text" id="note_${o.id}" class="chat-input" placeholder="พิมพ์หาลูกค้า...">
                        <div class="btn-group-admin">
                            <button class="btn-adm" style="background:var(--primary-color)" onclick="sendAdminNote('${o.id}')">💬 ส่งข้อความ</button>
                            <button class="btn-adm" style="background:var(--warning-color)" onclick="callCustomer('${o.id}')">🔔 เรียก</button>
                            <button class="btn-adm" style="background:var(--success-color)" onclick="updateStatus('${o.id}', 'done')">✅ เสร็จ</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        setTimeout(() => {
            document.querySelectorAll('.chat-container').forEach(el => { el.scrollTop = el.scrollHeight; });
        }, 50);
    }

    async function sendAdminNote(id) {
        const inputField = document.getElementById(`note_${id}`);
        const msg = inputField.value.trim();
        if(!msg) return;

        let o = lastDataState[id] || { admin_note: "", customer_note: "" };
        let chatLog = [];
        try {
            let parsed = JSON.parse(o.admin_note);
            if(Array.isArray(parsed)) chatLog = parsed;
        } catch(e) {
            if(o.admin_note) chatLog.push({sender: 'admin', text: o.admin_note});
            if(o.customer_note) chatLog.push({sender: 'customer', text: o.customer_note});
        }
        chatLog.push({sender: 'admin', text: msg});

        await _supabase.from('orders').update({ admin_note: JSON.stringify(chatLog) }).eq('id', id);
        inputField.value = "";
        refreshOrders();
    }

    async function callCustomer(id) {
        const { data } = await _supabase.from('orders').select('call_trigger').eq('id', id).single();
        await _supabase.from('orders').update({ call_trigger: (data.call_trigger || 0) + 1 }).eq('id', id);
    }

    async function sendReply(id) {
        const inputField = document.getElementById(`rep_${id}`);
        const msg =
