<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAMA WRAP - Tracking</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #d32f2f;
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --bg-color: #f4f4f4;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 480px; }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            text-align: center;
        }

        h2 { color: var(--primary-color); margin-bottom: 20px; }

        .order-item {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            text-align: left;
            border-left: 6px solid var(--warning-color);
        }

        .order-item.done { border-left-color: var(--success-color); }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 0.8em;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .status-cooking { background: #fff3e0; color: #ef6c00; }
        .status-done { background: #e8f5e9; color: #2e7d32; }

        /* Admin UI */
        #admin-ui { display: none; width: 100%; border-top: 2px dashed #ccc; padding-top: 30px; }
        .admin-card {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            color: white; font-family: 'Kanit'; font-weight: 600; cursor: pointer;
        }
        .btn-cooking { background: var(--warning-color); }
        .btn-done { background: var(--success-color); }

        .back-link { text-decoration: none; color: #888; font-size: 0.9em; margin-top: 10px; display: block; }

        #secret-trigger {
            margin-top: 50px;
            color: #ddd;
            font-size: 0.7em;
            padding: 20px;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="customer-ui" class="card">
        <h2>📍 ติดตามออเดอร์</h2>
        <div id="order-list">กำลังโหลด...</div>
        <a href="index.html" class="back-link">← กลับไปหน้าสั่งอาหาร</a>
    </div>

    <div id="admin-ui">
        <h2 style="text-align:center; color:#333;">👨‍🍳 ระบบหลังบ้าน</h2>
        <div id="admin-order-list"></div>
    </div>
</div>

<div id="secret-trigger">MAMA WRAP SYSTEM v1.2</div>

<script>
    const SUPABASE_URL = 'https://chomrpeichvhabaslsvr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNob21ycGVpY2h2aGFiYXNsc3ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjU5NjksImV4cCI6MjA5MDA0MTk2OX0.jC122_jMSTIh7kcRNCBxfR_OcPQYfjByMzdnoz6Qa_s';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const myName = localStorage.getItem('customerName') || "";

    async function refreshOrders() {
        const { data: orders, error } = await _supabase.from('orders').select('*').order('created_at', { ascending: false });
        if (error) return;

        // แสดงฝั่งลูกค้า
        const listDiv = document.getElementById('order-list');
        const myOrders = orders.filter(o => o.customer_name === myName).slice(0, 5);
        
        if (myOrders.length === 0) {
            listDiv.innerHTML = `<p style="color:#999;">ไม่พบออเดอร์ชื่อ "${myName}"</p>`;
        } else {
            listDiv.innerHTML = myOrders.map(o => `
                <div class="order-item ${o.status === 'done' ? 'done' : ''}">
                    <span class="status-badge ${o.status === 'done' ? 'status-done' : 'status-cooking'}">
                        ${o.status === 'done' ? '✅ เสร็จแล้ว' : '👨‍🍳 กำลังทำ'}
                    </span>
                    <div style="font-size:0.95em;">${o.order_details}</div>
                </div>
            `).join('');
        }

        // แสดงฝั่ง Admin
        if (document.getElementById('admin-ui').style.display === 'block') {
            const adminList = document.getElementById('admin-order-list');
            adminList.innerHTML = orders.slice(0, 15).map(o => `
                <div class="admin-card">
                    <strong>${o.customer_name}</strong><br><small>${o.order_details}</small>
                    <div class="btn-group">
                        <button class="btn btn-cooking" onclick="updateStatus('${o.id}', 'cooking')">ทำอยู่</button>
                        <button class="btn btn-done" onclick="updateStatus('${o.id}', 'done')">เสร็จ</button>
                    </div>
                </div>
            `).join('');
        }
    }

    async function updateStatus(id, newStatus) {
        await _supabase.from('orders').update({ status: newStatus }).eq('id', id);
        refreshOrders();
    }

    _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, refreshOrders).subscribe();

    // ระบบกดค้าง (0420) ที่เสถียรกว่าเดิม
    let timer;
    const trigger = document.getElementById('secret-trigger');

    function handleStart(e) {
        // ป้องกันการเลือกข้อความหรือเมนูขวา
        timer = setTimeout(() => {
            const pwd = prompt("ระบุรหัสพนักงาน:");
            if (pwd === "0420") {
                document.getElementById('admin-ui').style.display = 'block';
                refreshOrders();
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }, 2000);
    }

    function handleEnd() { clearTimeout(timer); }

    // รองรับทั้งนิ้วและเมาส์
    trigger.addEventListener('touchstart', handleStart);
    trigger.addEventListener('touchend', handleEnd);
    trigger.addEventListener('mousedown', handleStart);
    trigger.addEventListener('mouseup', handleEnd);
    trigger.addEventListener('mouseleave', handleEnd);

    refreshOrders();
</script>

</body>
</html>
