<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAMA WRAP - Tracking</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MAMA WRAP">
    <link rel="apple-touch-icon" href="icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "df78d0a1-1073-4072-b6d4-dd65f1842dc4",
          serviceWorkerPath: "sw.js",
          notifyButton: { enable: true },
        });
      });
    </script>

    <style>
        :root {
            --primary-color: #d32f2f;
            --success-color: #2e7d32;
            --bg-color: #f4f4f4;
            --admin-bubble: #fff3e0;
            --customer-bubble: #e8f5e9;
        }

        body { font-family: 'Kanit', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; }

        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        h2 { color: var(--primary-color); margin-bottom: 15px; }

        .queue-monitor { background: #fff3e0; border: 2px solid #ffcc80; border-radius: 15px; padding: 15px; margin-bottom: 20px; text-align: left; }
        .queue-header { font-size: 1.1em; color: #d32f2f; font-weight: bold; text-align: center; border-bottom: 1px dashed #ffcc80; padding-bottom: 8px; margin-bottom: 10px; }
        .queue-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ffe0b2; font-size: 0.9em; }

        .chat-container { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; padding: 10px; background: #fafafa; border-radius: 15px; border: 1px solid #eee; margin-bottom: 10px; }
        .msg-bubble { max-width: 85%; padding: 8px 12px; border-radius: 15px; font-size: 0.9em; line-height: 1.4; }
        .msg-admin { align-self: flex-start; background: var(--admin-bubble); color: #d32f2f; }
        .msg-customer { align-self: flex-end; background: var(--customer-bubble); color: #2e7d32; }

        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; }
        .chat-audio { width: 100%; height: 40px; margin-top: 5px; }

        .chat-input-area { background: #fff; border: 1px solid #ddd; border-radius: 15px; padding: 10px; }
        .chat-text-input { width: 100%; border: none; outline: none; font-family: 'Kanit'; font-size: 1em; padding: 8px 0; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        
        .chat-button-group { display: flex; gap: 5px; }
        .btn-chat-action { flex: 1; padding: 10px 5px; border: none; border-radius: 10px; cursor: pointer; color: white; font-weight: bold; font-size: 0.8em; }
        .btn-img { background: #0288d1; }
        .btn-voice { background: #555; }
        .btn-voice.recording { background: #d32f2f; }
        .btn-send { background: var(--success-color); }

        .order-item { background: white; border: 1px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 6px solid var(--primary-color); text-align: left; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 10px; font-size: 0.8em; font-weight: bold; margin-bottom: 10px; background: #eee; }

        #admin-ui { display: none; width: 100%; margin-top: 20px; border-top: 2px dashed #ccc; padding-top: 20px; }
        .btn-adm-control { padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; flex: 1; margin-top: 5px; }
        
        .back-link { text-decoration: none; color: white; background: #333; padding: 12px; border-radius: 10px; display: block; margin-top: 15px; text-align: center; }
        #secret-trigger { margin-top: 50px; color: #ddd; font-size: 0.7em; padding: 20px; cursor: default; }
    </style>
</head>
<body>

<audio id="orderDoneSound" src="orderdone.mp3"></audio>
<audio id="msgNotifySound" src="notify.mp3"></audio>

<div class="container">
    <div class="queue-monitor">
        <div class="queue-header">📊 ลำดับคิว (รอทำ: <span id="queue-count">0</span>)</div>
        <div id="public-queue-list"></div>
    </div>

    <div id="customer-ui" class="card">
        <h2>📍 ติดตามออเดอร์</h2>
        <div id="order-list">กำลังโหลดข้อมูล...</div>
        <a href="index.html" class="back-link">← กลับไปหน้าสั่งอาหาร</a>
    </div>

    <div id="admin-ui">
        <h2 style="text-align:center;">👨‍🍳 หลังบ้าน & แชท</h2>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="btn-adm-control" style="background:#555;" onclick="logoutAdmin()">🚪 ออก</button>
            <button class="btn-adm-control" style="background:#d32f2f;" onclick="clearAllOrders()">🗑️ ล้างทั้งหมด</button>
        </div>
        <div id="admin-order-list"></div>
    </div>
</div>

<div id="secret-trigger">MAMA WRAP v3.6 - MASTER FIXED</div>
<input type="file" id="file-input" style="display:none;" accept="image/*">

<script>
    const SUPABASE_URL = 'https://chomrpeichvhabaslsvr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNob21ycGVpY2h2aGFiYXNsc3ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjU5NjksImV4cCI6MjA5MDA0MTk2OX0.jC122_jMSTIh7kcRNCBxfR_OcPQYfjByMzdnoz6Qa_s';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const myName = localStorage.getItem('customerName') || "";
    let lastDataState = {};
    let soundUnlocked = false;
    let mediaRecorder;
    let audioChunks = [];

    let isAdminActive = localStorage.getItem('isMAMAWrapAdmin') === 'true';
    if (isAdminActive) document.getElementById('admin-ui').style.display = 'block';

    // ปลดล็อกเสียง
    window.addEventListener('click', () => {
        if (!soundUnlocked) {
            document.getElementById('orderDoneSound').play().then(() => document.getElementById('orderDoneSound').pause());
            soundUnlocked = true;
        }
    }, { once: true });

    function renderChatContent(text) {
        if (typeof text !== 'string') return text;
        if (text.includes('supabase.co/storage')) {
            if (text.match(/\.(jpeg|jpg|gif|png|webp)/i) || text.includes('img_')) {
                return `<img src="${text}" class="chat-img" onclick="window.open(this.src)">`;
            }
            if (text.match(/\.(webm|mp3|wav|m4a|voice)/i) || text.includes('voice_')) {
                return `<audio controls class="chat-audio" src="${text}"></audio>`;
            }
        }
        return text;
    }

    async function uploadFile(file, prefix = 'img') {
        const name = `${prefix}_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
        const { error } = await _supabase.storage.from('chat-attachments').upload(name, file);
        if (error) return null;
        return _supabase.storage.from('chat-attachments').getPublicUrl(name).data.publicUrl;
    }

    async function toggleVoice(id, type) {
        const btn = document.getElementById(`btn-voice-${id}`);
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const url = await uploadFile(new Blob(audioChunks, { type: 'audio/webm' }), 'voice');
                if (url) type === 'admin' ? await sendAdminNote(id, url) : await sendReply(id, myName, url);
                btn.classList.remove('recording');
                btn.innerHTML = `<i class="fa-solid fa-microphone"></i> เสียง`;
            };
            mediaRecorder.start();
            btn.classList.add('recording');
            btn.innerHTML = `<i class="fa-solid fa-stop"></i> หยุด`;
        } else { mediaRecorder.stop(); }
    }

    function triggerImage(id, type) {
        const input = document.getElementById('file-input');
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = await uploadFile(file, 'img');
                if (url) type === 'admin' ? await sendAdminNote(id, url) : await sendReply(id, myName, url);
            }
        };
        input.click();
    }

    async function refreshOrders() {
        const { data: orders, error } = await _supabase.from('orders').select('*').order('created_at', { ascending: true });
        if (error) return;

        const activeOrders = orders.filter(o => {
            if (o.status === 'done') return (new Date().getTime() - new Date(o.created_at).getTime()) < 3600000;
            return true;
        });

        activeOrders.forEach(o => {
            const prev = lastDataState[o.id];
            if (prev && o.customer_name === myName) {
                if (o.admin_note !== prev.admin_note && soundUnlocked) document.getElementById('msgNotifySound').play();
            }
            lastDataState[o.id] = o;
        });

        // คิวรวม
        let cookingCount = 0;
        let qHTML = "";
        activeOrders.forEach((o, i) => {
            if (o.status === 'cooking') cookingCount++;
            qHTML += `<div class="queue-row"><span>คิวที่ ${i+1} - คุณ ${o.customer_name.substring(0,2)}***</span> <b>${o.status==='done'?'✅':'👨‍🍳'}</b></div>`;
        });
        document.getElementById('queue-count').innerText = cookingCount;
        document.getElementById('public-queue-list').innerHTML = qHTML || "ยังไม่มีออเดอร์";

        // ฝั่งลูกค้า
        const myOrders = activeOrders.filter(o => o.customer_name === myName).reverse();
        document.getElementById('order-list').innerHTML = myOrders.map(o => {
            let log = []; try { log = JSON.parse(o.admin_note) || []; } catch(e) {}
            return `
                <div class="order-item">
                    <div class="status-badge">${o.status==='done'?'เสร็จแล้ว':'กำลังทำ'}</div>
                    <div style="font-weight:bold;">${o.order_details}</div>
                    <div class="chat-container">${log.map(c => `<div class="msg-bubble ${c.sender==='admin'?'msg-admin':'msg-customer'}">${renderChatContent(c.text)}</div>`).join('')}</div>
                    <div class="chat-input-area">
                        <input type="text" id="rep_${o.id}" class="chat-text-input" placeholder="แชทหาแอดมิน...">
                        <div class="chat-button-group">
                            <button class="btn-chat-action btn-img" onclick="triggerImage('${o.id}', 'customer')">รูป</button>
                            <button class="btn-chat-action btn-voice" id="btn-voice-${o.id}" onclick="toggleVoice('${o.id}', 'customer')">เสียง</button>
                            <button class="btn-chat-action btn-send" onclick="sendReply('${o.id}', '${myName}')">ส่ง</button>
                        </div>
                    </div>
                </div>`;
        }).join('') || "ไม่พบออเดอร์ของคุณ";

        // ฝั่งแอดมิน
        if (isAdminActive) {
            document.getElementById('admin-order-list').innerHTML = [...activeOrders].reverse().map(o => {
                let log = []; try { log = JSON.parse(o.admin_note) || []; } catch(e) {}
                return `
                    <div class="order-item">
                        <b>คุณ ${o.customer_name}</b> (${o.status})
                        <div class="chat-container">${log.map(c => `<div class="msg-bubble ${c.sender==='admin'?'msg-admin':'msg-customer'}">${renderChatContent(c.text)}</div>`).join('')}</div>
                        <div class="chat-input-area">
                            <input type="text" id="note_${o.id}" class="chat-text-input" placeholder="ตอบลูกค้า...">
                            <div class="chat-button-group">
                                <button class="btn-chat-action btn-img" onclick="triggerImage('${o.id}', 'admin')">รูป</button>
                                <button class="btn-chat-action btn-voice" id="btn-voice-${o.id}" onclick="toggleVoice('${o.id}', 'admin')">เสียง</button>
                                <button class="btn-chat-action btn-send" onclick="sendAdminNote('${o.id}')">ส่ง</button>
                            </div>
                        </div>
                        <div style="display:flex; gap:5px;">
                            <button class="btn-adm-control" style="background:var(--success-color)" onclick="updateStatus('${o.id}', 'done')">✅ เสร็จ</button>
                        </div>
                    </div>`;
            }).join('');
        }
        document.querySelectorAll('.chat-container').forEach(el => el.scrollTop = el.scrollHeight);
    }

    async function sendAdminNote(id, fileUrl = null) {
        const input = document.getElementById(`note_${id}`);
        const msg = fileUrl || (input ? input.value.trim() : "");
        if(!msg) return;
        const {data} = await _supabase.from('orders').select('admin_note').eq('id', id).single();
        let log = JSON.parse(data.admin_note) || [];
        log.push({ sender: 'admin', text: msg });
        await _supabase.from('orders').update({ admin_note: JSON.stringify(log) }).eq('id', id);
        if(!fileUrl) input.value = "";
        refreshOrders();
    }

    async function sendReply(id, cusName, fileUrl = null) {
        const input = document.getElementById(`rep_${id}`);
        const msg = fileUrl || (input ? input.value.trim() : "");
        if(!msg) return;
        const {data} = await _supabase.from('orders').select('admin_note').eq('id', id).single();
        let log = JSON.parse(data.admin_note) || [];
        log.push({ sender: 'customer', text: msg });
        await _supabase.from('orders').update({ admin_note: JSON.stringify(log), customer_note: (fileUrl?"[ไฟล์]":msg) }).eq('id', id);
        if(!fileUrl) input.value = "";
        refreshOrders();
    }

    async function updateStatus(id, s) { await _supabase.from('orders').update({ status: s }).eq('id', id); refreshOrders(); }
    function logoutAdmin() { localStorage.removeItem('isMAMAWrapAdmin'); location.reload(); }
    async function clearAllOrders() { if(confirm('ล้างทั้งหมด?')) { await _supabase.from('orders').delete().neq('id', 0); refreshOrders(); } }

    _supabase.channel('orders').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, refreshOrders).subscribe();

    let timer;
    document.getElementById('secret-trigger').onmousedown = document.getElementById('secret-trigger').ontouchstart = () => {
        timer = setTimeout(() => { if (prompt("รหัส:") === "0420") { localStorage.setItem('isMAMAWrapAdmin', 'true'); location.reload(); } }, 2000);
    };

    refreshOrders();
</script>
</body>
</html>
